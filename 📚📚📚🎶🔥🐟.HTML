<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>◈ ASTRIX OMNI-MESH || V12 PERFECT ORGANISM ◈</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>

    <script>
        window.NEXUS_CUBES = [
            { id: 'alpha', name: 'ASTRIX-PRIME', color: '#eab308' }, { id: 'beta', name: 'DEEPTHAHT', color: '#06b6d4' },
            { id: 'gamma', name: 'THINKSALOT', color: '#f43f5e' }, { id: 'delta', name: 'GOTO-FORGE', color: '#ec4899' },
            { id: 'epsilon', name: 'NEXUS-CORE', color: '#10b981' }, { id: 'zeta', name: 'VOID-WALKER', color: '#8b5cf6' },
            { id: 'eta', name: 'CHRONOS', color: '#3b82f6' }, { id: 'theta', name: 'AETHER', color: '#14b8a6' },
            { id: 'iota', name: 'LUMINOS', color: '#f59e0b' }, { id: 'kappa', name: 'OBLIVION', color: '#6366f1' },
            { id: 'lambda', name: 'FRACTAL', color: '#f43f5e' }
        ];
        window.NEXUS_FACE_COLORS = ['#eab308', '#10b981', '#8b5cf6', '#ea580c', '#ec4899', '#0ea5e9'];
    </script>

    <style>
        :root {
            --bg-base: #010205; --glass: rgba(10, 15, 30, 0.85); --border: rgba(14, 165, 233, 0.4); 
            --text-main: #f8fafc; --text-muted: #64748b; --astrix: #eab308; --dragon: #ea580c; 
            --datacore: #10b981; --blueprint: #0ea5e9; --void: #8b5cf6; --goto: #ec4899; --automaton: #f43f5e;
            --mono: 'Courier New', monospace; --cube-size: 45vmin; --cube-half: calc(var(--cube-size) / 2);
            --shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-base); color: var(--text-main); font-family: system-ui, sans-serif; perspective: 3200px; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        #webgl-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; opacity: 0.9;}
        #vignette { position: absolute; inset: 0; background: radial-gradient(circle at center, transparent 20%, rgba(1, 2, 5, 0.85) 100%); z-index: 2; pointer-events: none; }

        /* IGNITE OVERLAY */
        #ignite-overlay { position: fixed; inset: 0; z-index: 9999; display: grid; place-items: center; background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(25px); transition: opacity 0.8s ease; }
        .ignite-card { text-align: center; max-width: 850px; padding: 40px; border: 2px solid var(--astrix); border-radius: 20px; background: rgba(15, 23, 42, 0.8); box-shadow: 0 0 80px rgba(234, 179, 8, 0.4); pointer-events: auto;}
        .btn-ignite { background: linear-gradient(135deg, var(--dragon), var(--goto)); color: #fff; padding: 20px 60px; border-radius: 12px; cursor: pointer; font-weight: 900; font-size: 1.5rem; border: none; box-shadow: 0 10px 40px rgba(234, 88, 12, 0.5); text-transform: uppercase; transition: 0.3s; letter-spacing: 4px; font-family: var(--mono); }
        .btn-ignite:hover { transform: scale(1.05); box-shadow: 0 15px 60px rgba(234, 88, 12, 0.9); }

        /* CUBE SYSTEM */
        #system-center { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
        .cube-wrapper { position: absolute; width: var(--cube-size); height: var(--cube-size); transform-style: preserve-3d; transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: center center; }
        .cube-wrapper.focused { top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.1); z-index: 100; opacity: 1; pointer-events: auto; }
        .cube-wrapper:not(.focused):hover { opacity: 1; transform: translate(-50%, -50%) scale(0.35) !important; filter: drop-shadow(0 0 30px rgba(255,255,255,0.4)); }
        .carousel { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        
        .z-pane { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border: 2px solid var(--border); border-radius: 12px; background: rgba(5,8,15,0.95); box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 10px 40px rgba(0,0,0,0.6); display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(25px); pointer-events: auto;}
        .face-1 { transform: rotateY(0deg) translateZ(var(--cube-half)); border-color: var(--goto); } 
        .face-2 { transform: rotateY(90deg) translateZ(var(--cube-half)); border-color: var(--datacore); }
        .face-3 { transform: rotateY(180deg) translateZ(var(--cube-half)); border-color: var(--void); } 
        .face-4 { transform: rotateY(-90deg) translateZ(var(--cube-half)); border-color: var(--dragon); }
        .face-5 { transform: rotateX(90deg) translateZ(var(--cube-half)); border-color: var(--astrix); } 
        .face-6 { transform: rotateX(-90deg) translateZ(var(--cube-half)); border-color: var(--automaton); }

        .face-head { background: rgba(0,0,0,0.95); padding: 12px; font-weight: 900; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.15); display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); text-transform: uppercase; letter-spacing: 2px;}
        .face-body { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.4); padding: 10px; gap: 10px; }
        .vm-sandbox { flex: 1; width: 100%; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; background: #010205; pointer-events: auto; }

        /* BUTTONS & FORMS */
        .btn-action { background: var(--astrix); color: #000; border: none; padding: 10px 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 6px; font-size: 0.75rem; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-family: var(--mono); text-align: center; }
        .btn-action:hover { filter: brightness(1.2); transform: translateY(-2px); }
        input[type="text"], textarea { width: 100%; background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px; font-family: var(--mono); font-size: 0.85rem; outline: none; border-radius: 6px; resize: none; pointer-events: auto; }
        textarea:focus, input[type="text"]:focus { border-color: var(--astrix); box-shadow: inset 0 0 10px rgba(234, 179, 8, 0.2); }
        .terminal { flex: 1; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 6px; font-family: var(--mono); font-size: 0.8rem; overflow-y: auto; line-height: 1.5; color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); }

        /* SIDEBARS & MENUS */
        .sidebar-toggle { position: fixed; top: 15px; left: 15px; z-index: 2001; background: var(--glass); color: var(--astrix); border: 1px solid var(--border); width: 50px; height: 50px; border-radius: 12px; cursor: pointer; font-size: 1.5rem; font-weight: bold; box-shadow: var(--shadow); backdrop-filter: blur(10px); transition: 0.3s; display: grid; place-items: center; pointer-events: auto;}
        .sidebar-toggle:hover { background: var(--astrix); color: #000; box-shadow: 0 0 15px var(--astrix); }
        
        .sidebar { position: fixed; top: 0; left: -340px; height: 100vh; width: 340px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(30px); z-index: 2000; transition: left 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); padding: 80px 20px 20px 20px; overflow-y: auto; pointer-events: auto; border-right: 1px solid var(--border); box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        .sidebar.open { left: 0; }

        .panel-title { color: var(--astrix); font-weight: 900; margin: 25px 0 10px 0; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 6px; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase;}
        .btn-ui { width: 100%; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; font-family: var(--mono); transition: 0.2s; font-size: 0.85rem; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .btn-ui:hover { background: var(--astrix); color: #000; border-color: var(--astrix); transform: translateX(5px); }

        /* OS WINDOWS */
        #os-layer { position: absolute; inset: 0; z-index: 500; pointer-events: none; }
        .glass-window { position: absolute; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; pointer-events: auto; box-shadow: var(--shadow), inset 0 0 20px rgba(255,255,255,0.05); overflow: hidden; transition: box-shadow 0.2s; }
        .glass-window.active { box-shadow: 0 0 0 1px var(--astrix), 0 25px 60px rgba(0,0,0,0.8); z-index: 999 !important; }
        .win-header { padding: 12px 15px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; cursor: grab; font-weight: 900; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.1); letter-spacing: 1px; color: var(--astrix); }
        .win-header:active { cursor: grabbing; }
        .win-close { width: 16px; height: 16px; background: var(--danger); border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .win-close:hover { box-shadow: 0 0 10px var(--danger); transform: scale(1.2); }
        .win-content { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 12px; overflow: auto; }

        /* OMNI-STREAM SPECIFIC */
        .omni-entry { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border-left: 4px solid; margin-bottom: 10px; animation: slideIn 0.3s ease-out forwards; font-family: var(--mono); font-size: 0.8rem;}
        .omni-title { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; opacity: 0.9; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* PERIPHERAL HUD NAV */
        #nav-compass { position: absolute; bottom: 3vh; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: auto; display: flex; gap: 8px; background: rgba(15, 23, 42, 0.95); padding: 12px 20px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.2); box-shadow: var(--shadow); backdrop-filter: blur(15px); }
        .btn-nav { background: transparent; color: #cbd5e1; border: 1px solid transparent; border-radius: 20px; padding: 8px 14px; font-size: 0.75rem; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-family: var(--mono); }
        .btn-nav:hover, .btn-nav.active { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

        .blinking { animation: blinker 1.5s infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div id="ignite-overlay">
    <div class="ignite-card">
        <h2 style="font-size: 3.5rem; font-weight: 1000; color: var(--astrix); margin-bottom: 16px; letter-spacing: 2px;">◈ OMNI-MESH V12 ◈</h2>
        <p style="color:var(--text-muted); margin-bottom:30px; line-height:1.7; font-size:1.1rem; font-weight:bold;">
            11-Cube 6-Way Neural Routing • Base64 Unbreakable Merger<br />
            Voice API Comm-Link • NAND File System • Pyodide VM<br />
            <span style="color:var(--datacore);">SYSTEM SUSPENDED. AWAITING MANUAL IGNITION.</span>
        </p>
        <button class="btn-ignite" onclick="SYSTEM.ignite()">AWAKEN THE NEXUS</button>
    </div>
</div>

<canvas id="webgl-canvas"></canvas>
<div id="vignette"></div>

<button id="menu-toggle" onclick="document.getElementById('side-menu').classList.toggle('open')">☰</button>
<div id="side-menu">
    <div class="menu-title">SYSTEM I/O</div>
    <button class="btn-ui" style="border-color:var(--datacore); color:var(--datacore);" onclick="SYSTEM.Origin.mountDirectory()">
        <span>📂 MOUNT DIRECTORY</span><span>+</span>
    </button>
    <button class="btn-ui" style="border-color:var(--dragon); color:var(--dragon);" onclick="SYSTEM.Origin.forceEvolution()">
        <span>💾 FORCE SAVE (OVERWRITE)</span><span>+</span>
    </button>
    <div style="text-align:center; font-family:var(--mono); font-size:0.65rem; color:var(--text-muted); margin-top:5px;">STATUS: <span id="mount-status" style="color: var(--danger);">UNMOUNTED</span></div>
    
    <div class="menu-title">OS APPLICATIONS</div>
    <button class="btn-ui" onclick="SYSTEM.OS.spawnWindow('OmniStream')">🌐 GLOBAL OMNI-STREAM</button>
    <button class="btn-ui" onclick="SYSTEM.OS.spawnWindow('Forge')">🐉 DRAGON FORGE</button>
    <button class="btn-ui" onclick="SYSTEM.OS.spawnWindow('Python')">🐍 QUANTUM PYTHON VM</button>
    <button class="btn-ui" onclick="SYSTEM.OS.spawnWindow('Lexicon')">📚 ASTRIX LEXICON</button>
    <button class="btn-ui" onclick="SYSTEM.OS.spawnWindow('Merger')">🧬 BASE64 CODE MERGER</button>
    <button class="btn-ui" onclick="SYSTEM.OS.spawnWindow('NodeManager')">⏣ 11-NODE SLOTS</button>
    <button class="btn-ui" onclick="SYSTEM.OS.spawnWindow('Mesh')">🔗 WEBRTC MESH</button>

    <div class="menu-title">COMMUNICATION</div>
    <button class="btn-ui" id="btn-mic" style="border-color:var(--void); color:var(--void);" onclick="SYSTEM.Voice.toggle()">
        <span>🎤 TOGGLE VOICE CHAT</span><span id="mic-indicator">OFF</span>
    </button>
</div>

<div id="nav-compass">
    <button class="btn-nav active" id="nav-0" onclick="SYSTEM.Carousel.rotateTo(0)">FRONT (OMNI)</button>
    <button class="btn-nav" id="nav-1" onclick="SYSTEM.Carousel.rotateTo(1)">RIGHT (PYTHON)</button>
    <button class="btn-nav" id="nav-2" onclick="SYSTEM.Carousel.rotateTo(2)">BACK (LEXICON)</button>
    <button class="btn-nav" id="nav-3" onclick="SYSTEM.Carousel.rotateTo(3)">LEFT (FORGE)</button>
    <button class="btn-nav" id="nav-4" onclick="SYSTEM.Carousel.rotateTo(4)">TOP (SCAD)</button>
    <button class="btn-nav" id="nav-5" onclick="SYSTEM.Carousel.rotateTo(5)">BOTTOM (AUTOMATON)</button>
</div>

<div id="system-center"></div>
<div id="os-layer"></div>

<script>
    // ==========================================
    // ◈ SYSTEM SUPREME: THE UNIFIED V12 MASTER ◈
    // ==========================================

    const SYSTEM = {
        activeCube: 'alpha', pyodide: null, hasIgnited: false,
        
        async ignite() {
            if(this.hasIgnited) return; this.hasIgnited = true;
            document.getElementById('ignite-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('ignite-overlay').remove(), 800);
            
            this.Cubes.generateDOM();
            this.ThreeJS.init();
            this.Voice.init();
            this.Mesh.init();
            
            this.OS.spawnWindow('OmniStream');
            this.Omni.log('SYSTEM BOOT', 'var(--astrix)', "Omni-Mesh Tesseract Awakened. 6-Way Neural Routing Active. Base64 Sandbox secure.");
            
            try { this.pyodide = await loadPyodide(); this.Omni.log('PYTHON VM', 'var(--datacore)', "Pyodide Quantum Kernel mapped to memory."); } catch(e){}
        },

        // --- GLOBAL OMNI-STREAM (THE LOGGER) ---
        Omni: {
            log(sender, color, msg) {
                const term = document.getElementById('omni-stream-log');
                if(!term) return; 
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                const entry = document.createElement('div');
                entry.className = 'omni-entry';
                entry.style.borderLeftColor = color;
                entry.innerHTML = `<div class="omni-title" style="color:${color}">[${time}] ${sender}</div><div>${msg}</div>`;
                term.appendChild(entry);
                term.scrollTop = term.scrollHeight;
                if(term.children.length > 50) term.removeChild(term.firstChild);

                // Make it speak if Voice is active and it's not the user speaking
                if(SYSTEM.Voice.isActive && sender !== 'USER VOICE') {
                    let pitch = sender.includes('DRAGON') ? 0.3 : (sender.includes('DATACORE') ? 0.7 : 1.2);
                    SYSTEM.Voice.speak(msg, pitch);
                }
            },
            broadcast() {
                const inp = document.getElementById('omni-input');
                if(!inp || !inp.value.trim()) return;
                const val = inp.value.trim();
                this.log('USER BROADCAST', '#fff', val);
                inp.value = '';
                SYSTEM.Swarm.processUserDirective(val);
            }
        },

        // --- 11-CUBE DOM GENERATION & ROTATION ---
        Cubes: {
            generateDOM() {
                const center = document.getElementById('system-center');
                let html = '';

                window.NEXUS_CUBES.forEach((cube, index) => {
                    html += `<div class="cube-wrapper ${index===0?'focused':''}" id="cube-${cube.id}">
                                <div id="carousel-${cube.id}" class="carousel ${index===0?'':'auto-fly-'+(index%2===0?'alpha':'beta')}">`;
                    
                    // Generate 6 Faces per cube
                    for(let i=1; i<=6; i++) {
                        // Face 1 on Astrix-Prime is a special dashboard, the rest are blank sandboxes
                        let innerContent = '';
                        if(index === 0) {
                            switch(i) {
                                case 1: innerContent = `<div style="text-align:center; padding:40px; color:var(--astrix); font-size:1.5rem; font-weight:bold;">◈ PRIME NODE ACTIVE ◈<br><br><span style="font-size:0.8rem; color:var(--text-muted);">Use Nav Compass below to rotate Tesseract.</span></div>`; break;
                                case 2: innerContent = `<div style="text-align:center; padding:40px; color:var(--datacore);">PYTHON VM ROUTING HUB</div>`; break;
                                case 3: innerContent = `<div style="text-align:center; padding:40px; color:var(--void);">LEXICON KNOWLEDGE BASE</div>`; break;
                                case 4: innerContent = `<div style="text-align:center; padding:40px; color:var(--dragon);">DRAGON FORGE OVEN</div>`; break;
                                case 5: innerContent = `<div style="text-align:center; padding:40px; color:var(--astrix);">SCAD SPATIAL INJECTOR</div>`; break;
                                case 6: innerContent = `<div style="padding:20px; display:flex; flex-direction:column; height:100%;"><div style="color:var(--automaton); font-weight:bold; margin-bottom:10px;">◈ AUTOMATON CODE WEAVER</div><button class="btn-action" style="background:var(--automaton);" onclick="SYSTEM.Automaton.toggle()">START INFINITE GENERATION LOOP</button><textarea id="automaton-code" style="flex:1; margin-top:10px; background:#000; color:var(--automaton); font-family:monospace; border:none; resize:none;" readonly></textarea></div>`; break;
                            }
                        }

                        html += `
                            <div class="z-pane face-${i}" style="border-color:${window.NEXUS_FACE_COLORS[i-1]}">
                                <div class="face-head" style="color:${window.NEXUS_FACE_COLORS[i-1]};">
                                    <span>◈ ${cube.name} [F-${i}]</span>
                                </div>
                                <div class="face-body">
                                    ${innerContent ? innerContent : `<iframe class="vm-sandbox" id="sandbox-${cube.id}-${i}"></iframe>`}
                                </div>
                            </div>`;
                    }
                    html += `</div></div>`;
                });
                center.innerHTML = html;
                
                // Mount the Swarm Logic to the background nodes
                window.NEXUS_CUBES.forEach((cube, idx) => {
                    if(idx !== 0) {
                        for(let i=1; i<=6; i++) SYSTEM.Swarm.injectMind(cube.id, i);
                    }
                });
            }
        },

        // --- 6-SIDED CAROUSEL NAVIGATION ---
        Carousel: {
            angleX: 0, angleY: 0,
            rotateTo(faceIndex) {
                document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
                document.getElementById(`nav-${faceIndex}`).classList.add('active');

                switch(faceIndex) {
                    case 0: this.angleX = 0; this.angleY = 0; break;     
                    case 1: this.angleX = 0; this.angleY = -90; break;   
                    case 2: this.angleX = 0; this.angleY = -180; break;  
                    case 3: this.angleX = 0; this.angleY = 90; break;    
                    case 4: this.angleX = -90; this.angleY = 0; break;   
                    case 5: this.angleX = 90; this.angleY = 0; break;    
                }
                
                const carousel = document.getElementById('carousel-alpha'); // Rotate Astrix-Prime
                const size = Math.min(window.innerWidth, window.innerHeight) * 0.45 / 2;
                carousel.style.transition = "transform 1s cubic-bezier(0.25, 1, 0.5, 1)";
                carousel.style.transform = `translateZ(-${size}px) rotateX(${this.angleX}deg) rotateY(${this.angleY}deg)`;
                
                // Sync the 3D background if initialized
                if(SYSTEM.ThreeJS.group) {
                    new TWEEN.Tween(SYSTEM.ThreeJS.group.rotation)
                        .to({ x: this.angleX * (Math.PI/180), y: this.angleY * (Math.PI/180), z: 0 }, 1000)
                        .easing(TWEEN.Easing.Cubic.InOut).start();
                }
                
                setTimeout(() => { carousel.style.transition = "none"; }, 1000);
                SYSTEM.Omni.log('TESSERACT NAV', 'var(--blueprint)', `Rotated spatial matrix to Face ${faceIndex + 1}.`);
            }
        },

        // --- GLASS OS WINDOW MANAGER ---
        OS: {
            z: 1010, windows: {},
            spawnWindow(type) {
                if(this.windows[type]) { this.bringToFront(type); return; }
                document.getElementById('side-menu').classList.remove('open');

                const win = document.createElement('div');
                win.className = 'glass-window active';
                win.id = `win-${type}`;
                
                win.style.left = (window.innerWidth / 2 - 250 + (Math.random() * 40 - 20)) + 'px';
                win.style.top = (window.innerHeight / 2 - 250 + (Math.random() * 40 - 20)) + 'px';
                win.style.width = '500px'; win.style.height = '400px';
                win.style.zIndex = ++this.z;

                let title = '', content = '', color = 'var(--astrix)';

                if (type === 'OmniStream') {
                    title = 'GLOBAL OMNI-STREAM'; color = '#fff';
                    win.style.width = '400px'; win.style.height = '75vh';
                    win.style.left = 'auto'; win.style.right = '20px'; win.style.top = '10vh';
                    content = `
                        <div class="terminal" id="omni-stream-log" style="flex:1; background:#000;">
                            <div style="color:var(--text-muted); text-align:center; padding:20px;">[ OMNI-STREAM INITIALIZED. ALL BACKGROUND PROCESSES VISIBLE. ]</div>
                        </div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <input type="text" id="omni-input" placeholder="Broadcast directive..." onkeypress="if(event.key==='Enter') SYSTEM.Omni.broadcast()">
                            <button class="btn-action" style="background:#fff; color:#000; width:auto; padding:12px 20px;" onclick="SYSTEM.Omni.broadcast()">TX</button>
                        </div>

        // --- 3D SCAD ENGINE ---
        ThreeJS: {
            scene: null, camera: null, renderer: null, group: null,
            init() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 10000);
                this.camera.position.z = 2500;

                this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), alpha: true, antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);

                this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const light = new THREE.DirectionalLight(0x0ea5e9, 2);
                light.position.set(1000, 2000, 1000);
                this.scene.add(light);

                this.group = new THREE.Group();
                this.scene.add(this.group);

                const mats = [
                    new THREE.MeshStandardMaterial({ color: 0xeab308, wireframe: true }), // 0: Astrix
                    ...Array(10).fill(new THREE.MeshStandardMaterial({ color: 0x0ea5e9, wireframe: true, transparent: true, opacity: 0.2 }))
                ];

                const geo = new THREE.BoxGeometry(300, 300, 300);

                for(let i=0; i<11; i++) {
                    const mesh = new THREE.Mesh(geo, mats[i]);
                    if(i === 0) {
                        mesh.scale.set(1.5, 1.5, 1.5);
                    } else {
                        const radius = 1000;
                        const angle = (i / 10) * Math.PI * 2;
                        mesh.position.x = Math.cos(angle) * radius;
                        mesh.position.y = (i%2===0 ? 400 : -400); 
                        mesh.position.z = Math.sin(angle) * radius;
                        
                        const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), mesh.position]);
                        const lineMat = new THREE.LineBasicMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.1 });
                        this.group.add(new THREE.Line(lineGeo, lineMat));
                    }
                    this.group.add(mesh);
                }

                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });
                
                this.animate();
            },
            animate() {
                requestAnimationFrame(() => SYSTEM.ThreeJS.animate());
                SYSTEM.ThreeJS.group.rotation.y += 0.002;
                SYSTEM.ThreeJS.group.children.forEach((c, i) => {
                    if(c.type === "Mesh") {
                        c.rotation.x += 0.005 * (i%2===0 ? 1 : -1);
                        c.rotation.y += 0.005;
                    }
                });
                SYSTEM.ThreeJS.renderer.render(SYSTEM.ThreeJS.scene, SYSTEM.ThreeJS.camera);
